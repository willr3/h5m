
#quarkus.native.additional-build-args=-H:+DashboardJson

# Index jjq-jakarta for JAX-RS provider auto-discovery (JqValueMessageBodyReader/Writer)
quarkus.index-dependency.jjq-jakarta.group-id=io.hyperfoil.tools
quarkus.index-dependency.jjq-jakarta.artifact-id=jjq-jakarta

# registering dummy datasource for each supported backend so that the drivers are not removed by dead code elimination
quarkus.datasource."sqlite".db-kind=sqlite
quarkus.datasource."sqlite".active=false
quarkus.datasource."postgresql".db-kind=postgresql
quarkus.datasource."postgresql".active=false

# defaulting to postgresql, but sqlite can also be used
quarkus.datasource.db-kind=postgresql
#quarkus.datasource.db-kind=sqlite
#quarkus.datasource.jdbc.url=jdbc:sqlite::memory:

quarkus.datasource.username=${DB_USERNAME:quarkus}
quarkus.datasource.password=${DB_PASSWORD:quarkus}
quarkus.datasource.jdbc.acquisition-timeout=PT30S
quarkus.datasource.jdbc.initial-size=1
quarkus.datasource.jdbc.min-size=1
quarkus.datasource.jdbc.max-size=10

#quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.fetch.batch-size=100

# Second-level cache (Hibernate @Immutable + READ_ONLY entities)
quarkus.hibernate-orm.second-level-caching-enabled=true
quarkus.hibernate-orm.cache."io.hyperfoil.tools.h5m.entity.ValueEntity".memory.object-count=20000
quarkus.hibernate-orm.cache."io.hyperfoil.tools.h5m.entity.NodeEntity".memory.object-count=500
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
# Prevent Hibernate from validating REST JSON serialization settings for DB JSON columns
quarkus.hibernate-orm.mapping.format.global=ignore

quarkus.banner.enabled=false

# CLI mode: disable HTTP server and default to SQLite (works out of the box)
# Override with -Dquarkus.datasource.db-kind=postgresql -Dquarkus.datasource.jdbc.url=jdbc:postgresql://host:port/db
%cli.quarkus.http.host-enabled=false
%cli.quarkus.datasource.db-kind=sqlite
%cli.quarkus.datasource.jdbc.url=jdbc:sqlite:${H5M_PATH:${user.home}/h5m.db}
%cli.quarkus.quinoa=false

# CORS for frontend development (dev profile only)
%dev.quarkus.http.cors=true
%dev.quarkus.http.cors.origins=/.*/
%dev.quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
%dev.quarkus.http.cors.headers=content-type,authorization

quarkus.package.jar.type=uber-jar
quarkus.package.jar.add-runner-suffix=false

# open api
quarkus.smallrye-openapi.operation-id-strategy=method
quarkus.smallrye-openapi.store-schema-directory=src/main/webui/

# quinoa
quarkus.quinoa.enable-spa-routing=true

#this disables the INFO messages from the cli
quarkus.log.category."io.quarkus".level=ERROR
quarkus.log.category."org.hibernate".level=ERROR

quarkus.log.category."org.hibernate.SQL_SLOW".level=INFO
quarkus.hibernate-orm.log.queries-slower-than-ms=100

#for debugging production jar
#10m timeout
quarkus.transaction-manager.default-transaction-timeout=PT10m

# Security - disabled by default (local/CLI mode)
h5m.security.enabled=false
h5m.api-key.expiration-days=365

# Disable proactive auth so unauthenticated requests can reach @PermitAll endpoints
quarkus.http.auth.proactive=false

# OIDC - disabled by default (enable via environment for service deployments)
quarkus.oidc.tenant-enabled=false
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:}
quarkus.oidc.client-id=${OIDC_CLIENT_ID:h5m}
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:}
quarkus.oidc.application-type=service
quarkus.oidc.token.principal-claim=preferred_username

# Mailer - configure via environment for service deployments
quarkus.mailer.from=${MAILER_FROM:h5m@localhost}
quarkus.mailer.host=${MAILER_HOST:localhost}
quarkus.mailer.port=${MAILER_PORT:25}
quarkus.mailer.mock=true

%test.h5m.slack.api.url=http://localhost:19876/api/chat.postMessage
h5m.slack.api.url=https://slack.com/api/chat.postMessage
